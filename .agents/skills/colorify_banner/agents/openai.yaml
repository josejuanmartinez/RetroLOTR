display_name: Colorify Banner
short_description: Recolor RetroLOTR banner art while preserving its original silhouette and transparent background.
default_prompt: Use the colorify-banner skill to recolor a RetroLOTR banner or crest image into vintage painted fantasy art while keeping the original banner shape, preserving transparent areas outside the cutout, and avoiding any new rectangular background or border. Match the source aspect ratio and reapply the source alpha mask after the edit.
